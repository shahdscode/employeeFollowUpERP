<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee ERP</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">E</div>
        <div class="brand-text">
          <h1>Employee ERP</h1>
          <p>Management System</p>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle sidebar" title="Collapse sidebar">
          <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav" aria-label="Main navigation">
        <!-- Rendered by JS -->
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" id="resetDataBtn" title="Reset Sample Data">
          <span class="btn-icon">↺</span>
          <span class="btn-label">Reset Sample Data</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-menu-btn" id="mobileMenuBtn" type="button" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div>
            <h2 id="pageTitle">Dashboard</h2>
            <p id="pageSubtitle">Overview of your employee management system</p>
          </div>
        </div>
        <div class="topbar-actions">
          <span class="badge" id="dbBadge">employee_erp</span>
        </div>
      </header>

      <section class="content" id="content">
        <!-- Views rendered by JS -->
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
